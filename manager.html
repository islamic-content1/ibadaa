<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>نتائج برنامج عبادة</title><link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet"><style>
:root{--g:#1a6b3c;--gd:#0f4a28;--gl:#d4f4e2;--r:#c0392b;--bg:#f0f7f0;--sf:#fff;--bd:#d0e8d0;--tx:#1a2e1a;--mu:#5a7a5a;--gold:#b8860b}*{box-sizing:border-box;font-family:'Amiri',serif!important}body{margin:0;background:var(--bg);color:var(--tx);padding:16px 10px 40px}.wrap{max-width:900px;margin:auto}.hdr{text-align:center;background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;border-radius:16px;padding:18px;margin-bottom:12px}.hdr h1{color:#d4a017;margin:4px}.btns{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}.btn{flex:1;min-width:130px;border:0;border-radius:10px;padding:10px;font-weight:700;font-size:14px;background:var(--g);color:#fff;cursor:pointer}.btn.del{background:#fff;color:var(--r);border:1.5px solid var(--r)}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}.stat{background:#fff;border:1px solid var(--bd);border-radius:12px;text-align:center;padding:10px}.stat b{display:block;color:var(--g);font-size:24px}.card{background:#fff;border:1px solid var(--bd);border-radius:14px;box-shadow:0 2px 12px #0001;margin-bottom:12px;overflow:hidden}.ch{background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;padding:12px;display:flex;justify-content:space-between;gap:8px;cursor:pointer}.name{font-size:18px;font-weight:800}.meta{font-size:13px;color:#c7f0d4}.body{padding:12px;display:none}.body.open{display:block}.days{display:flex;gap:5px;flex-wrap:wrap;margin:8px 0}.day{width:34px;height:34px;border-radius:8px;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:#eee;color:#999}.day.done{background:var(--gl);border-color:#5cb87a;color:var(--g)}table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}th{background:var(--g);color:#fff;padding:6px;border:1px solid #2b7b4e}td{padding:6px;border:1px solid #e5eee5;text-align:center}td.ib{text-align:right;font-weight:700}.ok{background:var(--gl);color:var(--g);font-weight:700}.no{background:#fcd5d5;color:var(--r);font-weight:700}.empty{text-align:center;color:var(--mu);padding:40px}.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--gd);color:#fff;padding:10px 22px;border-radius:30px;opacity:0;transition:.25s}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}@media(max-width:650px){.stats{grid-template-columns:repeat(2,1fr)}table{font-size:10px}td,th{padding:4px}}
</style></head><body><div class="wrap"><div class="hdr"><div>بسم الله الرحمن الرحيم</div><h1>نتائج برنامج عبادة</h1><p>صفحة المسؤولة</p></div><div class="btns"><button class="btn" onclick="loadData()">تحديث النتائج</button><button class="btn del" onclick="deleteGirl()">حذف بنت</button></div><div class="stats"><div class="stat"><span>عدد البنات</span><b id="girlsCount">0</b></div><div class="stat"><span>عدد التسليمات</span><b id="subCount">0</b></div><div class="stat"><span>أعلى مجموع</span><b id="topPts">0</b></div><div class="stat"><span>آخر يوم ظاهر</span><b id="lastDay">1</b></div></div><div id="content" class="empty">جاري التحميل...</div></div><div id="toast" class="toast"></div><script>
const API_URL='https://script.google.com/macros/s/AKfycbxwQ0sJ7vnhEJL8Ty2J4x8xUrG4sU5PElMbtzyK7UotDnLfpRv7NtO5EdAcDcjzyklMZg/exec';const START_DATE='2026-07-03';let DATA=null;
function currentDay(){const s=new Date(START_DATE+'T00:00:00'),n=new Date();s.setHours(0,0,0,0);n.setHours(0,0,0,0);return Math.max(1,Math.floor((n-s)/86400000)+1)}
async function loadData(){content.textContent='جاري التحميل...';try{const r=await fetch(API_URL+'?action=getData');DATA=await r.json();render()}catch(e){content.textContent='تعذر تحميل البيانات'}}
function render(){const girls=DATA.girls||[],items=DATA.items||[],maxDay=Math.max(currentDay(),...((DATA.submissions||[]).map(s=>s.day||1)));girlsCount.textContent=girls.length;subCount.textContent=(DATA.submissions||[]).length;topPts.textContent=girls[0]?.totalPoints||0;lastDay.textContent=maxDay;if(!girls.length){content.className='empty';content.textContent='لا توجد تسليمات بعد';return}content.className='';content.innerHTML=girls.map((g,idx)=>card(g,idx,items,maxDay)).join('')}
function card(g,idx,items,maxDay){let days='';for(let d=1;d<=maxDay;d++)days+=`<div class="day ${g.days&&g.days[d]?'done':''}">${d}</div>`;let tables='';for(let d=1;d<=maxDay;d++){const sub=g.days&&g.days[d];tables+=`<h4>اليوم ${d} ${sub?`- المجموع: ${sub.totalPoints}`:'- لم تسلّم'}</h4>`;if(sub){tables+=`<table><tr><th>البند</th><th>النقاط</th><th>الحالة</th></tr>${items.map(i=>`<tr><td class="ib">${i.name}</td><td>${i.bonus?'+':''}${i.points}</td><td class="${sub.values[i.key]?'ok':'no'}">${sub.values[i.key]?'✓':'×'}</td></tr>`).join('')}<tr><th>الأساسي</th><th colspan="2">${sub.basePoints}</th></tr><tr><th>الإضافات</th><th colspan="2">${sub.bonusPoints}</th></tr><tr><th>المجموع</th><th colspan="2">${sub.totalPoints}</th></tr></table>`}}return `<div class="card"><div class="ch" onclick="this.nextElementSibling.classList.toggle('open')"><div><div class="name">${idx+1}. ${g.name}</div><div class="meta">أيام مسلّمة: ${g.submittedDays}</div></div><div class="meta">${g.totalPoints} علامة</div></div><div class="body"><div class="days">${days}</div>${tables}</div></div>`}
async function deleteGirl(){if(!DATA) return;const name=prompt('اكتبي اسم البنت للحذف كما هو:');if(!name)return;if(!confirm('أكيد حذف كل بيانات '+name+'؟'))return;try{const r=await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'deleteGirl',name})});const d=await r.json();toast(d.message||'تم');loadData()}catch(e){toast('حدث خطأ بالحذف')}}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500)}loadData();
</script></body></html>
