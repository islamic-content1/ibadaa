<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نتائج برنامج عبادة</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--g:#1a6b3c;--gd:#0f4a28;--gl:#e8f6ee;--gold:#b8860b;--bg:#fdfaf5;--sf:#fff;--bd:#e2d9c8;--tx:#2c2416;--mu:#7a6a52;--r:#c0392b}
*{box-sizing:border-box;font-family:'Amiri',serif!important}body{margin:0;background:var(--bg);color:var(--tx);padding:18px 10px 45px}.wrap{max-width:980px;margin:auto}.hdr{text-align:center;border-bottom:1px solid var(--bd);padding-bottom:14px;margin-bottom:14px}.bsm{color:var(--gold);font-weight:700}.hdr h1{margin:5px 0;color:var(--gold);font-size:26px}.btns{display:flex;gap:8px;margin-bottom:12px}.btn{border:0;border-radius:12px;padding:11px 14px;font-size:15px;font-weight:700;cursor:pointer;background:linear-gradient(90deg,var(--g),var(--gd));color:#fff;flex:1}.btn.del{background:#fff;color:var(--r);border:1.5px solid var(--r)}.card{background:var(--sf);border:1px solid var(--bd);border-radius:14px;box-shadow:0 2px 12px #0001;padding:14px;margin-bottom:12px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stat{text-align:center;background:#fff;border:1px solid var(--bd);border-radius:12px;padding:10px}.stat b{display:block;color:var(--g);font-size:24px}.section-title{font-size:20px;color:var(--g);font-weight:700;margin:4px 0 10px}.days-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}.day-card{border:1.5px solid var(--bd);border-radius:14px;background:#fff;overflow:hidden}.day-head{background:var(--g);color:#fff;padding:9px 12px;font-weight:700;display:flex;justify-content:space-between}.winner{padding:12px;text-align:center;background:#fffdf0;border-bottom:1px solid #f0c040}.winner .cup{font-size:24px}.winner .name{font-size:19px;font-weight:800;color:var(--gold)}.winner .pts{font-size:13px;color:var(--mu)}.rank-list{padding:8px}.rank-row{display:flex;align-items:center;gap:7px;border:1px solid #eee;border-radius:10px;padding:7px;margin-bottom:6px;background:#fafafa}.rank-row.first{background:#fff8e1;border-color:#f0c040}.num{width:24px;height:24px;border-radius:50%;background:var(--mu);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}.first .num{background:var(--gold)}.rname{flex:1;font-weight:700}.rpts{color:var(--g);font-weight:800}.empty{text-align:center;color:var(--mu);padding:14px}.girls-table{width:100%;border-collapse:collapse;font-size:13px}th{background:var(--g);color:#fff;padding:8px;border:1px solid #2d7b4d}td{padding:7px;border:1px solid #eee;text-align:center}td.name{text-align:right;font-weight:700}.ok{background:#e8f6ee;color:var(--g);font-weight:700}.no{background:#f7f7f7;color:#aaa}.details{display:none;background:#fafafa;border-radius:10px;margin-top:6px;padding:8px}.details.show{display:block}.small-btn{font-size:12px;padding:5px 8px;border:1px solid var(--bd);background:#fff;border-radius:8px;cursor:pointer}.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--gd);color:#fff;padding:10px 22px;border-radius:30px;opacity:0;transition:.25s;white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}select{width:100%;border:1.5px solid var(--bd);border-radius:10px;padding:9px;margin:6px 0;font-size:14px}
@media(max-width:650px){.stats{grid-template-columns:repeat(2,1fr)}.btns{flex-direction:column}.girls-table{font-size:11px}th,td{padding:5px 2px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr"><div class="bsm">بسم الله الرحمن الرحيم</div><h1>نتائج برنامج عبادة</h1></div>
  <div class="btns"><button class="btn" onclick="loadData()">تحديث النتائج</button><button class="btn del" onclick="deleteSelected()">حذف بنت</button></div>
  <div class="card"><select id="girlSelect"><option value="">اختاري بنت للحذف</option></select></div>
  <div class="card stats"><div class="stat"><span>عدد البنات</span><b id="girlsCount">0</b></div><div class="stat"><span>عدد التسليمات</span><b id="subsCount">0</b></div><div class="stat"><span>أعلى مجموع</span><b id="topTotal">0</b></div><div class="stat"><span>آخر يوم</span><b id="lastDay">0</b></div></div>
  <div class="card"><div class="section-title">الأولى في كل يوم</div><div class="days-grid" id="dailyWinners"></div></div>
  <div class="card"><div class="section-title">جدول كل البنات وكل الأيام</div><div style="overflow:auto"><table class="girls-table" id="girlsTable"></table></div></div>
</div>
<div class="toast" id="toast"></div>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbxwQ0sJ7vnhEJL8Ty2J4x8xUrG4sU5PElMbtzyK7UotDnLfpRv7NtO5EdAcDcjzyklMZg/exec';
let DATA=null;
async function loadData(){
  toast('جاري التحديث...');
  try{
    const res=await fetch(API_URL+'?action=getData&v='+Date.now());
    const data=await res.json();
    DATA=data;
    renderAll();
    toast('تم تحديث النتائج');
  }catch(e){toast('تعذر تحميل البيانات');console.error(e)}
}
function renderAll(){
  const girls=DATA.girls||[], subs=DATA.submissions||[];
  const maxDay=Math.max(0,...subs.map(s=>Number(s.day)||0));
  girlsCount.textContent=girls.length; subsCount.textContent=subs.length; lastDay.textContent=maxDay;
  topTotal.textContent=girls.length?Math.max(...girls.map(g=>Number(g.totalPoints)||0)):0;
  girlSelect.innerHTML='<option value="">اختاري بنت للحذف</option>'+girls.map(g=>`<option value="${esc(g.name)}">${esc(g.name)}</option>`).join('');
  renderDailyWinners(subs,maxDay); renderGirlsTable(girls,maxDay);
}
function renderDailyWinners(subs,maxDay){
  if(!maxDay){dailyWinners.innerHTML='<div class="empty">لا توجد تسليمات بعد</div>';return}
  let html='';
  for(let d=1; d<=maxDay; d++){
    const daySubs=subs.filter(s=>Number(s.day)===d).sort((a,b)=>(b.totalPoints||0)-(a.totalPoints||0));
    if(!daySubs.length){html+=`<div class="day-card"><div class="day-head"><span>اليوم ${d}</span><span>لا يوجد</span></div><div class="empty">لا توجد تسليمات</div></div>`;continue}
    const top=daySubs[0];
    html+=`<div class="day-card"><div class="day-head"><span>اليوم ${d}</span><span>${daySubs.length} تسليم</span></div><div class="winner"><div class="cup">🏆</div><div class="name">${esc(top.name)}</div><div class="pts">الأولى: ${top.totalPoints} علامة</div></div><div class="rank-list">`;
    daySubs.slice(0,8).forEach((s,i)=>{html+=`<div class="rank-row ${i===0?'first':''}"><div class="num">${i+1}</div><div class="rname">${esc(s.name)}</div><div class="rpts">${s.totalPoints}</div></div>`});
    html+='</div></div>';
  }
  dailyWinners.innerHTML=html;
}
function renderGirlsTable(girls,maxDay){
  if(!girls.length){girlsTable.innerHTML='<tr><td class="empty">لا توجد بيانات بعد</td></tr>';return}
  let head='<tr><th>الاسم</th><th>المجموع</th><th>أيام التسليم</th>';
  for(let d=1;d<=maxDay;d++) head+=`<th>يوم ${d}</th>`;
  head+='</tr>';
  let body='';
  girls.forEach(g=>{
    body+=`<tr><td class="name">${esc(g.name)}</td><td><b>${g.totalPoints||0}</b></td><td>${g.submittedDays||0}</td>`;
    for(let d=1;d<=maxDay;d++){
      const s=g.days&&g.days[d];
      body+=s?`<td class="ok">${s.totalPoints} ✓</td>`:`<td class="no">—</td>`;
    }
    body+='</tr>';
  });
  girlsTable.innerHTML=head+body;
}
async function deleteSelected(){
  const name=girlSelect.value;
  if(!name)return toast('اختاري بنت أولاً');
  if(!confirm('حذف كل بيانات '+name+'؟'))return;
  try{
    const res=await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'deleteGirl',name})});
    const data=await res.json(); toast(data.message||'تم'); loadData();
  }catch(e){toast('تعذر الحذف')}
}
function esc(s){return String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500)}
loadData();
</script>
</body>
</html>
