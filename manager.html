<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>نتائج برنامج عبادة</title>

  <link
    rel="icon"
    type="image/png"
    href="icon-192.png"
  >

  <link
    rel="apple-touch-icon"
    href="apple-touch-icon.png"
  >

  <link
    rel="manifest"
    href="manifest-manager.json"
  >

  <meta
    name="theme-color"
    content="#1a6b3c"
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --g: #1a6b3c;
      --gd: #0f4a28;
      --gl: #e8f6ee;
      --gold: #b8860b;
      --bg: #f0f7f0;
      --sf: #fff;
      --bd: #d0e8d0;
      --tx: #1a2e1a;
      --mu: #5a7a5a;
      --r: #c0392b;
    }

    * {
      box-sizing: border-box;
      font-family: 'Amiri', serif !important;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--tx);
      padding: 16px 10px 40px;
    }

    .wrap {
      max-width: 1100px;
      margin: auto;
    }

    .hdr {
      text-align: center;
      padding: 22px 14px;
      background: linear-gradient(
        135deg,
        var(--gd),
        var(--g)
      );
      border-radius: 16px;
      color: #fff;
      margin-bottom: 14px;
    }

    .bsm {
      color: #d4f4e2;
      font-weight: 700;
    }

    .hdr h1 {
      color: var(--gold);
      margin: 4px 0;
      font-size: 28px;
    }

    .group-name {
      margin-top: 8px;
      font-weight: 700;
      color: #fff;
    }

    .btns {
      display: grid;
      grid-template-columns:
        repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    button {
      font-size: 15px;
      font-weight: 700;
      border-radius: 10px;
      padding: 10px;
      border: 0;
      cursor: pointer;
    }

    .refresh {
      background: var(--g);
      color: #fff;
    }

    .delete {
      background: #fff;
      color: var(--r);
      border: 1.5px solid var(--r);
    }

    .danger {
      background: var(--r);
      color: #fff;
    }

    .settings {
      background: #fff;
      border: 1px solid var(--bd);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 2px 10px #0001;
    }

    .settings-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--g);
      margin-bottom: 8px;
    }

    .settings-row {
      display: grid;
      grid-template-columns:
        minmax(180px, 1fr)
        auto;
      gap: 8px;
      align-items: end;
      margin-bottom: 10px;
    }

    .settings label {
      display: block;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .settings input[type="date"] {
      width: 100%;
      padding: 10px;
      border: 1.5px solid var(--bd);
      border-radius: 10px;
      font-size: 16px;
      background: #fff;
    }

    .settings-note {
      color: var(--mu);
      font-size: 13px;
      line-height: 1.7;
      margin: 4px 0 12px;
    }

    .cards {
      display: grid;
      grid-template-columns:
        repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .card {
      background: var(--sf);
      border: 1px solid var(--bd);
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 2px 10px #0001;
    }

    .stat {
      text-align: center;
    }

    .stat b {
      display: block;
      color: var(--g);
      font-size: 26px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--g);
      margin: 14px 0 8px;
    }

    .day-winners {
      display: grid;
      grid-template-columns:
        repeat(
          auto-fit,
          minmax(170px, 1fr)
        );
      gap: 8px;
      margin-bottom: 14px;
    }

    .winner {
      background: #fffdf0;
      border: 1px solid #f0c040;
      border-radius: 14px;
      padding: 12px;
      text-align: center;
    }

    .winner .day {
      color: #856404;
      font-weight: 800;
    }

    .winner .name {
      font-size: 20px;
      font-weight: 800;
      color: var(--g);
    }

    .winner .pts {
      color: #856404;
      font-weight: 700;
    }

    .table-wrap {
      overflow: auto;
      background: #fff;
      border: 1px solid var(--bd);
      border-radius: 14px;
      box-shadow: 0 2px 10px #0001;
      margin-bottom: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th,
    td {
      border: 1px solid #e4efe4;
      padding: 8px;
      text-align: center;
      font-size: 14px;
    }

    th {
      background: var(--g);
      color: #fff;
      position: sticky;
      top: 0;
    }

    td.name {
      font-weight: 800;
      text-align: right;
      background: #f8fff8;
    }

    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 2px 8px;
      font-weight: 800;
      font-size: 12px;
    }

    .done {
      background: #d4f4e2;
      color: #1a6b3c;
    }

    .miss {
      background: #f3f3f3;
      color: #999;
    }

    .rank {
      background: #fff;
      border: 1px solid var(--bd);
      border-radius: 14px;
      padding: 10px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }

    .rank.top {
      background: #fffdf0;
      border-color: #f0c040;
    }

    .rank .num {
      font-weight: 900;
      color: var(--gold);
    }

    .rank .name {
      font-weight: 900;
      font-size: 17px;
    }

    .rank .pts {
      font-weight: 900;
      color: var(--g);
    }

    .details {
      display: none;
      background: #fbfffb;
      border: 1px solid var(--bd);
      border-radius: 12px;
      padding: 10px;
      margin-top: 8px;
    }

    .details.open {
      display: block;
    }

    .detail-grid {
      display: grid;
      grid-template-columns:
        repeat(
          auto-fit,
          minmax(155px, 1fr)
        );
      gap: 6px;
    }

    .item {
      border: 1px solid #e3eee3;
      border-radius: 10px;
      padding: 7px;
      background: #fff;
      font-size: 13px;
    }

    .item.y {
      background: #e8f6ee;
      color: #1a6b3c;
    }

    .item.n {
      background: #fff5f5;
      color: #c0392b;
    }

    .empty {
      text-align: center;
      color: var(--mu);
      padding: 40px;
      font-size: 16px;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform:
        translateX(-50%)
        translateY(70px);
      background: var(--gd);
      color: #fff;
      padding: 10px 22px;
      border-radius: 30px;
      opacity: 0;
      transition: .25s;
      white-space: nowrap;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform:
        translateX(-50%)
        translateY(0);
    }

    @media (max-width: 650px) {
      .cards {
        grid-template-columns:
          repeat(2, 1fr);
      }

      .btns {
        grid-template-columns: 1fr;
      }

      .settings-row {
        grid-template-columns: 1fr;
      }

      .settings-row button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="wrap">

    <div class="hdr">
      <div class="bsm">
        بسم الله الرحمن الرحيم
      </div>

      <h1>
        نتائج برنامج عبادة
      </h1>

      <div
        class="group-name"
        id="groupName"
      ></div>
    </div>

    <div class="btns">
      <button
        class="refresh"
        onclick="loadData()"
      >
        تحديث النتائج
      </button>

      <button
        class="delete"
        onclick="deleteGirl()"
      >
        حذف بنت
      </button>
    </div>

    <div class="settings">

      <div class="settings-title">
        إعدادات البرنامج
      </div>

      <div class="settings-row">

        <div>
          <label for="startDate">
            تاريخ بداية البرنامج
          </label>

          <input
            id="startDate"
            type="date"
          >
        </div>

        <button
          class="refresh"
          onclick="saveStartDate()"
        >
          حفظ تاريخ البداية
        </button>

      </div>

      <div class="settings-note">
        التاريخ المختار سيكون اليوم الأول.
        اليوم التالي سيكون اليوم الثاني،
        وهكذا.
      </div>

      <button
        class="danger"
        style="width:100%"
        onclick="clearAllData()"
      >
        حذف جميع بيانات هذه المجموعة
      </button>

    </div>

    <div class="cards">

      <div class="card stat">
        <span>عدد البنات</span>
        <b id="girlsCount">0</b>
      </div>

      <div class="card stat">
        <span>عدد التسليمات</span>
        <b id="subsCount">0</b>
      </div>

      <div class="card stat">
        <span>أعلى مجموع</span>
        <b id="topScore">0</b>
      </div>

      <div class="card stat">
        <span>آخر يوم ظاهر</span>
        <b id="maxDay">1</b>
      </div>

    </div>

    <div class="section-title">
      الأولى في كل يوم
    </div>

    <div
      id="dayWinners"
      class="day-winners"
    ></div>

    <div class="section-title">
      جدول الأيام لكل بنت
    </div>

    <div id="daysTable"></div>

    <div class="section-title">
      الترتيب الكلي
    </div>

    <div id="overallRanks"></div>

  </div>

  <div
    class="toast"
    id="toast"
  ></div>

  <script>
    const API_URL =
      'https://script.google.com/macros/s/AKfycbxwQ0sJ7vnhEJL8Ty2J4x8xUrG4sU5PElMbtzyK7UotDnLfpRv7NtO5EdAcDcjzyklMZg/exec';

    const PARAMS =
      new URLSearchParams(
        window.location.search
      );

    const GROUP =
      PARAMS.get('group') === '2'
        ? '2'
        : '1';

    let DATA = null;

    document.getElementById(
      'groupName'
    ).textContent =
      GROUP === '2'
        ? 'مجموعة ا ليالي'
        : 'المجموعة الأولى';

    async function loadConfig() {
      try {
        const response = await fetch(
          API_URL +
          '?action=getConfig' +
          '&group=' +
          encodeURIComponent(GROUP) +
          '&ts=' +
          Date.now()
        );

        const data =
          await response.json();

        if (!data.ok) {
          throw new Error(
            data.message || 'خطأ'
          );
        }

        document.getElementById(
          'startDate'
        ).value =
          data.startDate || '';

        document.getElementById(
          'groupName'
        ).textContent =
          data.sheetName
            ? 'المجموعة: ' +
              data.sheetName
            : (
              GROUP === '2'
                ? 'مجموعة ا ليالي'
                : 'المجموعة الأولى'
            );

      } catch (error) {
        toast(
          'تعذر تحميل تاريخ البداية'
        );
      }
    }

    async function loadData() {
      try {
        toast(
          'جاري تحميل النتائج...'
        );

        const response = await fetch(
          API_URL +
          '?action=getData' +
          '&group=' +
          encodeURIComponent(GROUP) +
          '&ts=' +
          Date.now()
        );

        DATA = await response.json();

        if (!DATA.ok) {
          throw new Error(
            DATA.message || 'خطأ'
          );
        }

        if (DATA.startDate) {
          document.getElementById(
            'startDate'
          ).value =
            DATA.startDate;
        }

        renderAll();

        toast(
          'تم تحديث النتائج'
        );

      } catch (error) {
        document.getElementById(
          'dayWinners'
        ).innerHTML =
          '<div class="empty">تعذر تحميل البيانات</div>';

        toast(
          'تعذر تحميل البيانات'
        );
      }
    }

    function getMaxDay() {
      const submissions =
        DATA?.submissions || [];

      return Math.max(
        1,
        ...submissions.map(
          submission =>
            Number(submission.day) || 1
        )
      );
    }

    function renderAll() {
      const girls =
        DATA.girls || [];

      const submissions =
        DATA.submissions || [];

      girlsCount.textContent =
        girls.length;

      subsCount.textContent =
        submissions.length;

      topScore.textContent =
        girls.length
          ? Math.max(
              ...girls.map(
                girl =>
                  Number(
                    girl.totalPoints
                  ) || 0
              )
            )
          : 0;

      maxDay.textContent =
        getMaxDay();

      renderDayWinners();
      renderDaysTable();
      renderOverallRanks();
    }

    function renderDayWinners() {
      const submissions =
        DATA.submissions || [];

      const maximumDay =
        getMaxDay();

      let html = '';

      for (
        let day = 1;
        day <= maximumDay;
        day++
      ) {
        const daySubmissions =
          submissions
            .filter(
              submission =>
                Number(
                  submission.day
                ) === day
            )
            .sort(
              (a, b) =>
                (b.totalPoints || 0) -
                (a.totalPoints || 0)
            );

        if (daySubmissions.length) {
          const top =
            daySubmissions[0]
              .totalPoints || 0;

          const winners =
            daySubmissions.filter(
              submission =>
                (
                  submission.totalPoints ||
                  0
                ) === top
            );

          const names =
            winners
              .map(
                winner =>
                  escapeHtml(
                    winner.name
                  )
              )
              .join('، ');

          html += `
            <div class="winner">
              <div class="day">
                اليوم ${day}
              </div>

              <div class="name">
                🏆 ${names}
              </div>

              <div class="pts">
                ${top} علامة
                ${
                  winners.length > 1
                    ? ' (تعادل)'
                    : ''
                }
              </div>
            </div>
          `;

        } else {
          html += `
            <div class="winner">
              <div class="day">
                اليوم ${day}
              </div>

              <div class="name">
                —
              </div>

              <div class="pts">
                لا يوجد تسليم
              </div>
            </div>
          `;
        }
      }

      dayWinners.innerHTML =
        html ||
        '<div class="empty">لا توجد بيانات بعد</div>';
    }

    function renderDaysTable() {
      const girls =
        DATA.girls || [];

      const maximumDay =
        getMaxDay();

      if (!girls.length) {
        daysTable.innerHTML =
          '<div class="empty">لا توجد بيانات بعد</div>';

        return;
      }

      let html =
        '<div class="table-wrap">' +
        '<table>' +
        '<thead>' +
        '<tr>' +
        '<th>الاسم</th>';

      for (
        let day = 1;
        day <= maximumDay;
        day++
      ) {
        html +=
          `<th>اليوم ${day}</th>`;
      }

      html +=
        '<th>المجموع</th>' +
        '</tr>' +
        '</thead>' +
        '<tbody>';

      girls.forEach(girl => {
        html += `
          <tr>
            <td class="name">
              ${escapeHtml(girl.name)}
            </td>
        `;

        for (
          let day = 1;
          day <= maximumDay;
          day++
        ) {
          const submission =
            girl.days &&
            girl.days[day];

          html += `
            <td>
              ${
                submission
                  ? `
                    <button
                      class="badge done"
                      onclick="toggleDetails('${safeId(girl.name, day)}')"
                    >
                      ✅ ${submission.totalPoints}
                    </button>
                  `
                  : `
                    <span class="badge miss">
                      —
                    </span>
                  `
              }
            </td>
          `;
        }

        html += `
            <td>
              <b>
                ${girl.totalPoints || 0}
              </b>
            </td>
          </tr>
        `;

        for (
          let day = 1;
          day <= maximumDay;
          day++
        ) {
          const submission =
            girl.days &&
            girl.days[day];

          if (submission) {
            html += `
              <tr>
                <td colspan="${maximumDay + 2}">
                  <div
                    id="${safeId(girl.name, day)}"
                    class="details"
                  >
                    ${detailHtml(submission)}
                  </div>
                </td>
              </tr>
            `;
          }
        }
      });

      html +=
        '</tbody>' +
        '</table>' +
        '</div>';

      daysTable.innerHTML = html;
    }

    function detailHtml(submission) {
      const items =
        DATA.items || [];

      return `
        <b>
          ${escapeHtml(submission.name)}
          -
          اليوم ${submission.day}
        </b>

        <p>
          الأساسي:
          ${submission.basePoints}

          |

          الإضافات:
          ${submission.bonusPoints}

          |

          المجموع:
          ${submission.totalPoints}
        </p>

        <div class="detail-grid">
          ${
            items.map(item => {
              const selected =
                submission.values &&
                submission.values[
                  item.key
                ];

              return `
                <div class="item ${selected ? 'y' : 'n'}">
                  ${selected ? '✅' : '❌'}
                  ${escapeHtml(item.name)}
                  (${item.points})
                </div>
              `;
            }).join('')
          }
        </div>
      `;
    }

    function renderOverallRanks() {
      const girls =
        DATA.girls || [];

      if (!girls.length) {
        overallRanks.innerHTML =
          '<div class="empty">لا توجد بيانات بعد</div>';

        return;
      }

      let rank = 0;
      let previousPoints = null;

      overallRanks.innerHTML =
        girls.map((girl, index) => {
          const points =
            girl.totalPoints || 0;

          if (
            points !== previousPoints
          ) {
            rank = index + 1;
            previousPoints = points;
          }

          return `
            <div class="rank ${rank === 1 ? 'top' : ''}">
              <div>
                <span class="num">
                  #${rank}
                </span>

                <span class="name">
                  ${escapeHtml(girl.name)}
                </span>

                <br>

                <small>
                  عدد الأيام:
                  ${girl.submittedDays || 0}

                  |

                  الأساسي:
                  ${girl.basePoints || 0}

                  |

                  الإضافات:
                  ${girl.bonusPoints || 0}
                </small>
              </div>

              <div class="pts">
                ${points}
              </div>
            </div>
          `;
        }).join('');
    }

    function toggleDetails(id) {
      document
        .getElementById(id)
        ?.classList
        .toggle('open');
    }

    function safeId(name, day) {
      return (
        'd_' +
        btoa(
          unescape(
            encodeURIComponent(name)
          )
        )
          .replace(/=/g, '') +
        '_' +
        day
      );
    }

    async function deleteGirl() {
      const name = prompt(
        'اكتبي اسم البنت المراد حذفها كما هو تمامًا:'
      );

      if (!name) {
        return;
      }

      if (
        !confirm(
          'هل أنتِ متأكدة من حذف كل بيانات ' +
          name +
          '؟'
        )
      ) {
        return;
      }

      try {
        const response = await fetch(
          API_URL,
          {
            method: 'POST',
            body: JSON.stringify({
              action: 'deleteGirl',
              group: GROUP,
              name: name
            })
          }
        );

        const data =
          await response.json();

        toast(
          data.message || 'تم'
        );

        if (data.ok) {
          await loadData();
        }

      } catch (error) {
        toast('تعذر الحذف');
      }
    }

    async function saveStartDate() {
      const startDate =
        document.getElementById(
          'startDate'
        ).value;

      if (!startDate) {
        toast(
          'اختاري تاريخ بداية البرنامج'
        );

        return;
      }

      const confirmed = confirm(
        'سيصبح تاريخ ' +
        startDate +
        ' هو اليوم الأول لهذه المجموعة. هل أنتِ متأكدة؟'
      );

      if (!confirmed) {
        return;
      }

      try {
        const response = await fetch(
          API_URL,
          {
            method: 'POST',
            body: JSON.stringify({
              action: 'setStartDate',
              group: GROUP,
              startDate: startDate
            })
          }
        );

        const data =
          await response.json();

        toast(
          data.message ||
          'تم حفظ التاريخ'
        );

        if (data.ok) {
          await loadConfig();
        }

      } catch (error) {
        toast(
          'تعذر حفظ تاريخ البداية'
        );
      }
    }

    async function clearAllData() {
      const confirmation = prompt(
        'لحذف جميع بيانات هذه المجموعة اكتبي كلمة: حذف'
      );

      if (
        confirmation &&
        confirmation.trim() !== 'حذف'
      ) {
        toast('الكلمة غير صحيحة');
        return;
      }

      if (!confirmation) {
        return;
      }

      const confirmed = confirm(
        'سيتم حذف جميع الأسماء والتسليمات من هذه المجموعة نهائيًا. هل أنتِ متأكدة؟'
      );

      if (!confirmed) {
        return;
      }

      try {
        const response = await fetch(
          API_URL,
          {
            method: 'POST',
            body: JSON.stringify({
              action: 'clearGroup',
              group: GROUP
            })
          }
        );

        const data =
          await response.json();

        toast(
          data.message || 'تم الحذف'
        );

        if (data.ok) {
          await loadData();
        }

      } catch (error) {
        toast(
          'تعذر حذف البيانات'
        );
      }
    }

    function escapeHtml(text) {
      return String(text ?? '')
        .replace(
          /[&<>"']/g,
          character => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
          })[character]
        );
    }

    function toast(text) {
      const element =
        document.getElementById(
          'toast'
        );

      element.textContent = text;

      element.classList.add(
        'show'
      );

      setTimeout(() => {
        element.classList.remove(
          'show'
        );
      }, 2500);
    }

    loadConfig();
    loadData();
  </script>

</body>
</html>
