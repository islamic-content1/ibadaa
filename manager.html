<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نتائج برنامج عبادة</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--g:#1a6b3c;--gd:#0f4a28;--gl:#e8f6ee;--gm:#5cb87a;--gold:#b8860b;--bg:#f0f7f0;--sf:#fff;--bd:#d0e8d0;--tx:#1a2e1a;--mu:#5a7a5a;--r:#c0392b;--rl:#fcd5d5;--sh:0 2px 16px rgba(0,0,0,.08)}
*{box-sizing:border-box;font-family:'Amiri',serif!important}body{margin:0;background:var(--bg);color:var(--tx);padding:16px 10px 50px}.wrap{max-width:980px;margin:auto}.hdr{text-align:center;background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;border-radius:16px;padding:22px 12px;margin-bottom:12px;box-shadow:var(--sh)}.bsm{font-size:15px;color:#d9f3df}.hdr h1{margin:5px 0;color:#d4a017;font-size:27px}.hdr p{font-size:13px;margin:0}.btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}.btn{border:0;border-radius:11px;padding:11px;font-size:15px;font-weight:700;cursor:pointer;background:var(--g);color:#fff}.btn-del{background:#fff;color:var(--r);border:1.5px solid var(--r)}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}.stat{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:10px;text-align:center;box-shadow:0 1px 6px #0000000d}.stat span{display:block;color:var(--mu);font-size:12px}.stat b{font-size:23px;color:var(--g)}.card{background:#fff;border:1px solid var(--bd);border-radius:14px;padding:12px;margin-bottom:12px;box-shadow:var(--sh)}.card-title{font-size:17px;font-weight:700;color:var(--g);margin-bottom:8px}.status{text-align:center;color:var(--mu);padding:25px}.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--bd)}table{width:100%;border-collapse:collapse;background:#fff;min-width:760px}th{background:var(--g);color:#fff;padding:8px 6px;font-size:13px;border:1px solid #2d7a4e;white-space:nowrap}td{padding:7px 6px;border:1px solid #e5eee5;text-align:center;font-size:13px}.name-cell{font-weight:700;text-align:right;position:sticky;right:0;background:#fff;z-index:1;min-width:120px}.total-cell{font-weight:700;color:var(--g)}.day-chip{display:inline-flex;align-items:center;justify-content:center;width:34px;height:30px;border-radius:7px;border:1px solid var(--bd);font-weight:700;cursor:pointer}.day-chip.done{background:var(--gl);border-color:var(--gm);color:var(--g)}.day-chip.miss{background:#f5f5f5;color:#bbb}.rank{display:flex;align-items:center;gap:9px;border:1px solid var(--bd);border-radius:11px;padding:8px;margin-bottom:6px;background:#fbfffb}.rank-num{width:28px;height:28px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}.rank-info{flex:1}.rank-name{font-weight:700}.rank-meta{font-size:12px;color:var(--mu)}.rank-pts{font-size:18px;color:var(--g);font-weight:700}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center;padding:12px}.modal.show{display:flex}.modal-box{background:#fff;border-radius:16px;max-width:520px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 10px 35px rgba(0,0,0,.25)}.modal-head{background:var(--g);color:#fff;padding:12px 14px;display:flex;align-items:center;justify-content:space-between}.modal-head b{font-size:17px}.close{background:#fff;color:var(--r);border:0;border-radius:8px;padding:4px 12px;font-weight:700;cursor:pointer}.modal-body{padding:12px}.detail-row{display:flex;justify-content:space-between;gap:8px;padding:8px;border-bottom:1px solid #edf3ed}.detail-row.done{background:#f3fbf5}.detail-row.miss{background:#fff7f7}.detail-name{font-weight:700}.detail-pts{color:var(--g);font-weight:700}.detail-alt{font-size:11px;color:var(--mu);line-height:1.5}.sum-box{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}.sum{border:1px solid var(--bd);border-radius:10px;text-align:center;padding:8px}.sum b{display:block;color:var(--g);font-size:20px}select{width:100%;border:1.5px solid var(--bd);border-radius:10px;padding:10px;font-size:15px;background:#fff;margin-bottom:8px}.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--gd);color:#fff;padding:10px 22px;border-radius:30px;opacity:0;transition:.25s;white-space:nowrap;z-index:1000}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}@media(max-width:650px){.stats{grid-template-columns:repeat(2,1fr)}.btns{grid-template-columns:1fr}.hdr h1{font-size:24px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr"><div class="bsm">بسم الله الرحمن الرحيم</div><h1>نتائج برنامج عبادة</h1></div>
  <div class="btns"><button class="btn" onclick="loadData()">تحديث النتائج</button><button class="btn btn-del" onclick="openDelete()">حذف بنت</button></div>
  <div class="stats"><div class="stat"><span>عدد البنات</span><b id="girlsCount">0</b></div><div class="stat"><span>عدد التسليمات</span><b id="subsCount">0</b></div><div class="stat"><span>أعلى مجموع</span><b id="topScore">0</b></div><div class="stat"><span>آخر يوم ظاهر</span><b id="lastDay">1</b></div></div>
  <div class="card"><div class="card-title">الترتيب العام</div><div id="rankingBox" class="status">جاري تحميل البيانات...</div></div>
  <div class="card"><div class="card-title">جدول الأيام لكل بنت</div><div id="daysTableBox" class="status">جاري تحميل البيانات...</div></div>
</div>
<div class="modal" id="detailModal"><div class="modal-box"><div class="modal-head"><b id="modalTitle">تفاصيل اليوم</b><button class="close" onclick="closeModal('detailModal')">إغلاق</button></div><div class="modal-body" id="modalBody"></div></div></div>
<div class="modal" id="deleteModal"><div class="modal-box"><div class="modal-head"><b>حذف بنت</b><button class="close" onclick="closeModal('deleteModal')">إغلاق</button></div><div class="modal-body"><select id="deleteSelect"><option value="">اختاري اسم البنت</option></select><button class="btn btn-del" onclick="deleteGirl()">تأكيد الحذف</button></div></div></div>
<div class="toast" id="toast"></div>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbxwQ0sJ7vnhEJL8Ty2J4x8xUrG4sU5PElMbtzyK7UotDnLfpRv7NtO5EdAcDcjzyklMZg/exec';
const START_DATE='2026-07-03';
let DATA={items:[],girls:[],submissions:[]};
function currentDay(){const s=new Date(START_DATE+'T00:00:00');const n=new Date();s.setHours(0,0,0,0);n.setHours(0,0,0,0);return Math.max(1,Math.floor((n-s)/86400000)+1)}
function showToast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500)}
async function loadData(){rankingBox.textContent='جاري تحميل البيانات...';daysTableBox.textContent='جاري تحميل البيانات...';try{const res=await fetch(API_URL+'?action=getData&t='+Date.now());const data=await res.json();if(!data.ok)throw new Error(data.message||'خطأ');DATA=data;renderAll();}catch(e){rankingBox.textContent='تعذر تحميل البيانات';daysTableBox.textContent='تعذر تحميل البيانات';showToast('تعذر تحميل البيانات')}}
function renderAll(){const maxDay=Math.max(currentDay(),...DATA.submissions.map(s=>Number(s.day)||1),1);girlsCount.textContent=DATA.girls.length;subsCount.textContent=DATA.submissions.length;topScore.textContent=DATA.girls[0]?.totalPoints||0;lastDay.textContent=maxDay;renderRanking();renderDaysTable(maxDay);fillDeleteSelect()}
function renderRanking(){if(!DATA.girls.length){rankingBox.innerHTML='<div class="status">لا توجد بيانات بعد</div>';return}rankingBox.innerHTML=DATA.girls.map((g,i)=>`<div class="rank"><div class="rank-num">${i+1}</div><div class="rank-info"><div class="rank-name">${escapeHtml(g.name)}</div><div class="rank-meta">${g.submittedDays} أيام • الأساسي ${g.basePoints||0} • الإضافات ${g.bonusPoints||0}</div></div><div class="rank-pts">${g.totalPoints}</div></div>`).join('')}
function renderDaysTable(maxDay){if(!DATA.girls.length){daysTableBox.innerHTML='<div class="status">لا توجد بيانات بعد</div>';return}let head='<tr><th>الاسم</th><th>المجموع</th><th>أيام التسليم</th>';for(let d=1;d<=maxDay;d++)head+=`<th>اليوم ${d}</th>`;head+='</tr>';let body=DATA.girls.map(g=>{let row=`<tr><td class="name-cell">${escapeHtml(g.name)}</td><td class="total-cell">${g.totalPoints}</td><td>${g.submittedDays}</td>`;for(let d=1;d<=maxDay;d++){const sub=g.days&&g.days[d];row+=`<td>${sub?`<span class="day-chip done" onclick="openDetails('${encodeURIComponent(g.name)}',${d})">✓</span>`:`<span class="day-chip miss">-</span>`}</td>`}return row+'</tr>'}).join('');daysTableBox.innerHTML=`<div class="table-wrap"><table>${head}${body}</table></div>`}
function openDetails(encName,day){const name=decodeURIComponent(encName);const g=DATA.girls.find(x=>x.name===name);const sub=g?.days?.[day];if(!sub)return;modalTitle.textContent=`${name} - اليوم ${day}`;let sums=`<div class="sum-box"><div class="sum"><span>الأساسي</span><b>${sub.basePoints}</b></div><div class="sum"><span>الإضافات</span><b>${sub.bonusPoints}</b></div><div class="sum"><span>المجموع</span><b>${sub.totalPoints}</b></div></div>`;let rows=DATA.items.map(i=>{const done=!!sub.values[i.key];return `<div class="detail-row ${done?'done':'miss'}"><div><div class="detail-name">${done?'✓':'✕'} ${escapeHtml(i.name)}</div>${i.alt?`<div class="detail-alt">${escapeHtml(i.alt)}</div>`:''}</div><div class="detail-pts">${done?(i.bonus?'+':'')+i.points:'0'}</div></div>`}).join('');modalBody.innerHTML=sums+rows;detailModal.classList.add('show')}
function openDelete(){fillDeleteSelect();deleteModal.classList.add('show')}
function fillDeleteSelect(){deleteSelect.innerHTML='<option value="">اختاري اسم البنت</option>'+DATA.girls.map(g=>`<option value="${escapeHtml(g.name)}">${escapeHtml(g.name)}</option>`).join('')}
async function deleteGirl(){const name=deleteSelect.value;if(!name)return showToast('اختاري اسم البنت');if(!confirm('تأكيد حذف كل بيانات '+name+'؟'))return;try{const res=await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'deleteGirl',name})});const data=await res.json();showToast(data.message||'تم');closeModal('deleteModal');loadData()}catch(e){showToast('تعذر الحذف')}}
function closeModal(id){document.getElementById(id).classList.remove('show')}
function escapeHtml(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
loadData();
</script>
</body>
</html>
